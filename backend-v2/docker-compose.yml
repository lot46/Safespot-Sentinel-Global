# SafeSpot Sentinel Global V2 - Development Environment
# PostgreSQL + PostGIS + Redis + Jaeger + Prometheus

version: '3.8'

services:
  # PostgreSQL with PostGIS
  postgres:
    image: postgis/postgis:15-3.4
    container_name: safespot-postgres
    environment:
      POSTGRES_DB: safespot_v2
      POSTGRES_USER: safespot
      POSTGRES_PASSWORD: secure_password
      POSTGRES_MULTIPLE_DATABASES: safespot_test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safespot -d safespot_v2"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - safespot-network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: safespot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - safespot-network

  # Jaeger for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:1.49
    container_name: safespot-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "14250:14250"  # gRPC
      - "14268:14268"  # HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: true
    networks:
      - safespot-network

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: safespot-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - safespot-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:10.1.0
    container_name: safespot-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - safespot-network

  # MinIO for S3-compatible object storage (development)
  minio:
    image: minio/minio:RELEASE.2023-09-07T02-05-02Z
    container_name: safespot-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - safespot-network

  # Mailhog for email testing
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: safespot-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # UI
    networks:
      - safespot-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  minio_data:
    driver: local

networks:
  safespot-network:
    driver: bridge
    name: safespot-network