# SafeSpot Sentinel Global V2 - Prometheus Configuration
# Metrics collection for application monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # SafeSpot Sentinel Global V2 API
  - job_name: 'safespot-backend'
    static_configs:
      - targets: ['localhost:8002']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Node.js application metrics
  - job_name: 'safespot-node-exporter'
    static_configs:
      - targets: ['localhost:9100']
    scrape_interval: 30s

  # PostgreSQL metrics (if pg_exporter is used)
  - job_name: 'safespot-postgres'
    static_configs:
      - targets: ['localhost:9187']
    scrape_interval: 30s

  # Redis metrics (if redis_exporter is used)
  - job_name: 'safespot-redis'
    static_configs:
      - targets: ['localhost:9121']
    scrape_interval: 30s

  # System metrics
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

# Alerting rules (example)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

